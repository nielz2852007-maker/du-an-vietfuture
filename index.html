<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VIET FUTURE</title>
    <style>
        body { font-family: sans-serif; margin: 0; line-height: 1.6; }
        header { padding: 20px; background: #fff; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        nav a { margin: 0 10px; text-decoration: none; color: #333; font-weight: bold; }
        .container { max-width: 900px; margin: auto; padding: 20px; text-align: center; }
        img { max-width: 100%; border-radius: 8px; margin: 15px 0; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

<header>
    <strong>VIET FUTURE</strong>
    <nav>
        <a href="#hero">GIỚI THIỆU</a>
        <!-- Đã sửa href từ #hoi-dong thành trang web VietFuture -->
        <a href="https://vietfuture.org/" target="_blank">HỘI ĐỒNG</a>
        <a href="#giai-thuong">GIẢI THƯỞNG</a>
        <a href="#tham-gia">THAM GIA</a>
        <a href="#lien-he">LIÊN HỆ</a>
    </nav>
</header>

<div class="container" id="hero">
    <h1>GIẢI THƯỞNG SÁNG TẠO TƯƠNG LAI 2026</h1>
    <img src="11/banner.jpg" alt="Banner">
</div>

<div class="container" id="giai-thuong">
    <h2>Lịch trình triển khai</h2>
    <img src="11/lich-trinh.jpg" alt="Lịch trình">
</div>

<div class="container" id="tham-gia">
    <h2>Hình ảnh hoạt động</h2>
    <div class="gallery">
        <img src="11/le-trao-giai.jpg" alt="Lễ trao giải">
        <img src="11/thuyet-trinh.jpg" alt="Thuyết trình">
    </div>
</div>

<footer class="container" id="lien-he">
    <h3>Liên hệ</h3>
    <img src="11/fb-icon.png" alt="FB" style="width: 40px;">
    <img src="11/zalo-icon.png" alt="Zalo" style="width: 40px;">
</footer>

</body>
</html>
