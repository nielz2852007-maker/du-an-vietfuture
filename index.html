<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VietFuture Awards 2026</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; color: #333; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background: #fff; border-bottom: 1px solid #ddd; }
        .nav-menu { display: flex; list-style: none; gap: 20px; }
        .nav-menu a { text-decoration: none; color: #333; font-weight: bold; }
        
        .hero { text-align: center; padding: 50px 20px; background: #f9f9f9; }
        .hero img { max-width: 100%; border-radius: 10px; margin: 20px 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .content { max-width: 800px; margin: 40px auto; padding: 20px; }
        .content img { width: 100%; border-radius: 10px; margin: 20px 0; }
        
        .gallery { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .gallery img { width: 300px; border-radius: 10px; }
        
        .footer { text-align: center; padding: 30px; background: #eee; margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><strong>VIET FUTURE</strong></div>
        <ul class="nav-menu">
            <li><a href="#">GIỚI THIỆU</a></li>
            <li><a href="#">HỘI ĐỒNG</a></li>
            <li><a href="#">GIẢI THƯỞNG</a></li>
            <li><a href="#">THAM GIA</a></li>
        </ul>
    </nav>

    <div class="hero">
        <h1>GIẢI THƯỞNG SÁNG TẠO TƯƠNG LAI 2026</h1>
        <img src="banner.jpg" alt="Banner chính">
        <p>Kết nối các dự án khởi nghiệp và công nghệ từ sinh viên toàn quốc.</p>
    </div>

    <div class="content">
        <h2>Lịch trình triển khai</h2>
        <img src="lich-trinh.jpg" alt="Lịch trình">
        
        <h2>Hình ảnh hoạt động</h2>
        <div class="gallery">
            <img src="le-trao-giai.jpg" alt="Lễ trao giải">
            <img src="thuyet-trinh.jpg" alt="Vòng thuyết trình">
        </div>
    </div>

    <div class="footer">
        <h3>Liên hệ</h3>
        <a href="#"><img src="fb-icon.png" alt="Facebook" style="width: 50px; margin: 0 10px;"></a>
        <a href="#"><img src="zalo-icon.png" alt="Zalo" style="width: 50px; margin: 0 10px;"></a>
    </div>

</body>
</html>
